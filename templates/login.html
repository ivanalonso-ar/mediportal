{% extends "base.html" %}

{% block title %}Login — MediPortal{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 px-4 py-10">

    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-8">

        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100">
                MediPortal
            </h1>

            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">
                Iniciar sesión
            </p>

        </div>

        {% if error %}
        <div class="mb-5 rounded-lg border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/30 px-4 py-3 text-sm text-red-700 dark:text-red-300">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-5">

            <div>

                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                    Tipo de usuario
                </label>

                <select
                    name="tipo"
                    required
                    class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5 text-sm"
                >
                    <option value="paciente">Paciente</option>
                    <option value="staff">Staff</option>
                </select>

            </div>

            <div>

                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    DNI o Email
                </label>

                <input
                    type="text"
                    name="dni_email"
                    required
                    autofocus
                    class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5 text-sm"
                >

            </div>

            <div>

                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5 text-sm"
                >

            </div>

            <button
                type="submit"
                class="w-full rounded-xl bg-accent-600 hover:bg-accent-700 py-3 text-sm font-semibold text-white transition-colors"
            >
                Entrar
            </button>

        </form>

        <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">

            ¿No tenés cuenta?

            <a
                href="/registro"
                class="text-accent-600 dark:text-accent-400 hover:underline"
            >
                Registrate
            </a>

        </p>

    </div>

</div>
{% endblock %}
