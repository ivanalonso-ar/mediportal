{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex flex-col">

    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">

            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-sky-600 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                </div>
                <span class="font-semibold text-slate-800 dark:text-slate-100">MediPortal</span>
                <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-400">Profesional</span>
            </div>

            <nav class="hidden sm:flex items-center gap-1">
                <a href="/profesional/agenda"
                    class="px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5
                        {% if active_page == 'agenda' %}bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Mi agenda
                </a>
                <a href="/profesional/informes"
                    class="px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5
                        {% if active_page == 'informes' %}bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Cargar informe
                </a>
            </nav>

            <div class="flex items-center gap-2">
                <button id="theme-toggle" onclick="toggleTheme()"
                    class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <span class="icon-moon" style="display:block">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                        </svg>
                    </span>
                    <span class="icon-sun" style="display:none">
                        <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        </svg>
                    </span>
                </button>

                <div class="flex items-center gap-2 pl-2 border-l border-slate-200 dark:border-slate-700">
                    <div class="w-8 h-8 rounded-full bg-sky-100 dark:bg-sky-900/40 flex items-center justify-center">
                        <span class="text-sky-700 dark:text-sky-400 text-xs font-semibold">{{ user.nombre[0] }}{{ user.apellido[0] }}</span>
                    </div>
                    <span class="hidden sm:block text-sm font-medium text-slate-700 dark:text-slate-300">{{ user.nombre }}</span>
                    <a href="/logout" class="ml-1 p-1.5 text-slate-400 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20" title="Cerrar sesión">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Mobile nav -->
        <div class="sm:hidden flex border-t border-slate-100 dark:border-slate-800">
            <a href="/profesional/agenda"
                class="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-medium
                    {% if active_page == 'agenda' %}text-sky-700 dark:text-sky-400 bg-sky-50 dark:bg-sky-900/20{% else %}text-slate-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Mi agenda
            </a>
            <a href="/profesional/informes"
                class="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-medium
                    {% if active_page == 'informes' %}text-sky-700 dark:text-sky-400 bg-sky-50 dark:bg-sky-900/20{% else %}text-slate-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Cargar informe
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full px-4 sm:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-800 py-4 text-center text-xs text-slate-400">
        MediPortal &copy; {{ request.state.year }}
    </footer>
</div>
{% endblock %}
